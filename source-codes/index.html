<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HR Assistant — PeopleDesk</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="chat.css">

</head>
<body>

<div class="shell">

  <div class="header">
    <h2>PeopleDesk AI</h2>
    <p>HR Virtual Assistant</p>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask about HR..." onkeydown="if(event.key==='Enter') sendMsg()" />
    <button onclick="sendMsg()">➤</button>
  </div>

</div>

<script src="chat.js"></script>
</body>
</html>
